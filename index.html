<!DOCTYPE html>
<html>
<head>
<title>Installment Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  margin: 0;
  padding: 20px;
  box-sizing: border-box;
}

.logo {
  text-align: center;
  margin-bottom: 20px;
}

.logo img {
  max-width: 180px;
  height: auto;
}

.wrapper {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  max-width: 1100px;
  margin: 0 auto;
}

.container {
  width: 340px;
  border: 1px solid #ccc;
  background: white;
  box-sizing: border-box;
  border-radius: 4px;
  margin-bottom: 20px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}

.header {
  background: #1f5fbf;
  color: white;
  padding: 10px;
  font-size: 18px;
  text-align: center;
  border-radius: 4px 4px 0 0;
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 8px 12px;
  border-bottom: 1px solid #ddd;
  align-items: center;
}

input, select {
  width: 120px;
  padding: 5px;
  font-size: 16px;
  border-radius: 3px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

.result {
  font-weight: bold;
  font-size: 20px;
  padding: 10px 12px;
  display: flex;
  justify-content: space-between;
  border-radius: 0 0 4px 4px;
}

.main-title{
text-align:center;
color:#0f56ba;
font-weight:bold;
margin-bottom:25px;
}

.total {
  background: #f5f5f5;
}

.final {
  background: #7a7ad6;
  color: white;
}

@media (max-width: 1150px) {
  .wrapper {
    justify-content: center;
  }
}

@media (max-width: 1080px) {
  .container {
    width: 300px;
  }
}

@media (max-width: 720px) {
  .wrapper {
    flex-direction: column;
    align-items: center;
  }
  
  .container {
    width: 100%;
    max-width: 350px;
  }
}

</style>
</head>

<body>

<div class="logo">
<img src="logo.png" alt="Company Logo">
</div>

<h2 class="main-title">
Installments Calculators (Monthly, Weekly, Daily)
</h2>

<div class="wrapper">

  <!-- MONTHLY -->
  <div class="container">

    <div class="header">
      Monthly Installment Calculator
    </div>

    <div class="row">
      <label for="mcost">Product Cost</label>
      <input type="number" id="mcost" value="78000" min="0" />
    </div>

    <div class="row">
      <label for="mmarkup">Markup (%)</label>
      <select id="mmarkup">
        <option>20</option>
        <option>25</option>
        <option>30</option>
        <option selected>35</option>
        <option>36</option>
        <option>37</option>
        <option>38</option>
        <option>39</option>
        <option>40</option>
        <option>41</option>
        <option>42</option>
        <option>43</option>
        <option>44</option>
        <option>45</option>
      </select>
    </div>

    <div class="row">
      <label for="mmonths">Monthly Period</label>
      <select id="mmonths">
        <option>3</option>
        <option selected>6</option>
        <option>8</option>
        <option>9</option>
        <option>10</option>
        <option>12</option>
        <option>15</option>
      </select>
    </div>

    <div class="result total">
      <span>Total Sale Price</span>
      <span id="mtotal">0</span>
    </div>

    <div class="result final">
      <span>Monthly Installment</span>
      <span id="mmonthly">0</span>
    </div>

  </div>

  <!-- WEEKLY -->
  <div class="container">

    <div class="header">
      Weekly Installment Calculator
    </div>

    <div class="row">
      <label for="wcost">Product Cost</label>
      <input type="number" id="wcost" value="40000" min="0" />
    </div>

    <div class="row">
      <label for="wmarkup">Markup (%)</label>
      <select id="wmarkup">
        <option selected>10</option>
        <option>15</option>
        <option>20</option>
        <option>25</option>
        <option>30</option>
        <option>35</option>
        <option>36</option>
        <option>37</option>
        <option>38</option>
        <option>39</option>
        <option>40</option>
      </select>
    </div>

    <div class="row">
      <label for="wweeks">Weekly Period</label>
      <select id="wweeks">
        <option>4</option>
        <option selected>6</option>
        <option>8</option>
        <option>10</option>
        <option>12</option>
        <option>14</option>
        <option>16</option>
        <option>18</option>
        <option>20</option>
      </select>
    </div>

    <div class="result total">
      <span>Total Sale Price</span>
      <span id="wtotal">0</span>
    </div>

    <div class="result final">
      <span>Weekly Installment</span>
      <span id="wweekly">0</span>
    </div>

  </div>

  <!-- DAILY -->
  <div class="container">

    <div class="header">
      Daily Installment Calculator
    </div>

    <div class="row">
      <label for="dcost">Product Cost</label>
      <input type="number" id="dcost" value="4200" min="0" />
    </div>

    <div class="row">
      <label for="dmarkup">Markup (%)</label>
      <select id="dmarkup">
        <option selected>5</option>
        <option>10</option>
        <option>15</option>
        <option>20</option>
        <option>25</option>
        <option>30</option>
        <option>35</option>
        <option>36</option>
        <option>37</option>
        <option>38</option>
        <option>39</option>
        <option>40</option>
      </select>
    </div>

    <div class="row">
      <label for="ddays">Daily Period</label>
      <select id="ddays">
        <option>5</option>
        <option selected>6</option>
        <option>7</option>
        <option>8</option>
        <option>9</option>
        <option>10</option>
        <option>11</option>
        <option>12</option>
        <option>13</option>
        <option>14</option>
        <option>15</option>
        <option>16</option>
        <option>17</option>
        <option>18</option>
        <option>19</option>
        <option>20</option>
        <option>21</option>
        <option>22</option>
        <option>23</option>
        <option>24</option>
        <option>25</option>
        <option>26</option>
        <option>27</option>
        <option>28</option>
        <option>29</option>
        <option>30</option>
      </select>
    </div>

    <div class="result total">
      <span>Total Sale Price</span>
      <span id="dtotal">0</span>
    </div>

    <div class="result final">
      <span>Daily Installment</span>
      <span id="ddaily">0</span>
    </div>

  </div>

</div>

<script>
function calcMonthly() {
  let cost = Number(document.getElementById("mcost").value);
  let markup = Number(document.getElementById("mmarkup").value);
  let months = Number(document.getElementById("mmonths").value);
  let total = cost + (cost * markup / 100);
  let pay = total / months;

  document.getElementById("mtotal").innerText = "Rs " + total.toFixed(0);
  document.getElementById("mmonthly").innerText = pay.toFixed(0);
}

function calcWeekly() {
  let cost = Number(document.getElementById("wcost").value);
  let markup = Number(document.getElementById("wmarkup").value);
  let weeks = Number(document.getElementById("wweeks").value);
  let total = cost + (cost * markup / 100);
  let pay = total / weeks;

  document.getElementById("wtotal").innerText = "Rs " + total.toFixed(0);
  document.getElementById("wweekly").innerText = pay.toFixed(0);
}

function calcDaily() {
  let cost = Number(document.getElementById("dcost").value);
  let markup = Number(document.getElementById("dmarkup").value);
  let days = Number(document.getElementById("ddays").value);
  let total = cost + (cost * markup / 100);
  let pay = total / days;

  document.getElementById("dtotal").innerText = "Rs " + total.toFixed(0);
  document.getElementById("ddaily").innerText = pay.toFixed(0);
}

document.querySelectorAll("input,select").forEach(el => {
  el.addEventListener("change", () => {
    calcMonthly();
    calcWeekly();
    calcDaily();
  });
});

calcMonthly();
calcWeekly();
calcDaily();

</script>

</body>
</html>
